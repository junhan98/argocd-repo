# ========== 5. ⭐ 必须新增:两个 Service(Canary 用)==========
# Rollout 必须有 canaryService 和 stableService
# ArgoCD Rollouts 会自动维护这两个 Service 的 selector
apiVersion: v1
kind: Service
metadata:
  name: online-cashier-stable
  namespace: default
  labels: { app: online-cashier }
spec:
  type: ClusterIP
  selector:
    app: online-cashier           # ⭐ 只匹配稳定版 Pod
  ports:
    - name: app-port
      port: 60019
      targetPort: 60019
    - name: mgmt-port
      port: 22222
      targetPort: 22222
    - name: app-port-60023    # ⭐ 补上
      port: 60023
      targetPort: 60023
---
apiVersion: v1
kind: Service
metadata:
  name: online-cashier-canary
  namespace: default
  labels: { app: online-cashier }
spec:
  type: ClusterIP
  selector:
    app: online-cashier           # ⭐ Rollout 会自动改成匹配金丝雀版
  ports:
    - name: app-port
      port: 60019
      targetPort: 60019
    - name: mgmt-port
      port: 22222
      targetPort: 22222
    - name: app-port-60023    # ⭐ 补上
      port: 60023
      targetPort: 60023
